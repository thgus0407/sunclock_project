<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUN_clock project</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; color: #333; margin: 0; padding: 50px 20px; }
        .container { max-width: 900px; margin: 0 auto; text-align: center; }
        .content-box { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin: 30px 0; }
        .image-grid img { width: 100%; border-radius: 8px; object-fit: cover; aspect-ratio: 3/4; background-color: #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <div class="content-box">
            <h1>프로젝트 제목을 적어주세요</h1>
            <p>여기에 프로젝트에 대한 간단한 설명을 적으시면 됩니다.</p>
            <div class="image-grid">
                <img src="photo1.jpg" alt="이미지 1">
                <img src="photo2.jpg" alt="이미지 2">
                <img src="photo3.jpg" alt="이미지 3">
            </div>
            <p style="color: #888; font-size: 0.9rem;">작품 설명 내용을 적어주세요.</p>
        </div>
    </div>
</body>
</html>
